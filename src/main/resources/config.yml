rtp:
  cooldown-seconds: 30
  menu:
    title: "§dRTP Dünya Seç"
    rows: 3
  worlds:
    orman_dunyasi:
      target-world: "survival" # BetterRTP bu dünyada rtp atacak
      icon:
        material: OAK_SAPLING
        name: "§aOrman Dünyası"
        slot: 11
        lore:
          - "§7Ormanlık alana ışınlan."
# ==========================================
#       MultiLobby - Ana Yapılandırma
# ==========================================

first-join:
  spawn: true # Sunucuya ilk kez girenler spawnda mı doğsun?

spawn:
  warmup-seconds: 3 # Işınlanma bekleme süresi
  cancel-on-move: true # Hareket edince ışınlanma iptal olsun mu?
  # /setspawn veya /setlobby yazıldığında buralar otomatik dolar:
  world: "spawn"
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

void-protect:
  world: "spawn"
  y-threshold: -60.0 # Bu kordinatın altına düşenler ölmeden spawna atılır

